<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Iframe Demo - Map & External Page</title>
</head>

<body>

    <h1>Iframe Demonstration</h1>

    <!-- Section 1: Embedded Google Map -->
    <h2>Location Map</h2>
    <iframe 
        src="https://www.google.com/maps?q=Nagpur&output=embed"
        width="400" 
        height="300"
        title="Map of Nagpur"
        allowfullscreen>
    </iframe>

    <br><br>

    <!-- Section 2: External Website -->
    <h2>External Webpage</h2>
    <iframe 
        src="https://www.wikipedia.org/"
        width="600" 
        height="400"
        title="Wikipedia Page"
        loading="lazy">
    </iframe>

</body>
</html>
