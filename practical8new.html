<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(-45deg, #ff6a00, #ee0979, #00c6ff, #0072ff);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            min-height: 100vh;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            text-align: center;
            padding: 25px;
        }

        header h1 {
            font-size: 2.8rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            padding: 25px;
        }

        .card {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            display: block;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover img {
            transform: scale(1.15);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
            opacity: 0;
        }

        /* Initial Directions */
        .top    { transform: translateY(-100%); }
        .bottom { transform: translateY(100%); }
        .left   { transform: translateX(-100%); }
        .right  { transform: translateX(100%); }

        /* Hover: bring to center with fade-in */
        .card:hover .top,
        .card:hover .bottom,
        .card:hover .left,
        .card:hover .right {
            transform: translate(0,0);
            opacity: 1;
        }
    </style>
</head>

<body>

<header>
    <h1>Image Gallery</h1>
</header>

<div class="gallery">

    <div class="card">
        <img src="https://picsum.photos/400/300?random=1">
        <div class="overlay top">From Top</div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?random=2">
        <div class="overlay bottom">From Bottom</div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?random=3">
        <div class="overlay left">From Left</div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?random=4">
        <div class="overlay right">From Right</div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?random=5">
        <div class="overlay top">Nature</div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?random=6">
        <div class="overlay bottom">City</div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?random=7">
        <div class="overlay left">Forest</div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?random=8">
        <div class="overlay right">Travel</div>
    </div>

</div>

</body>
</html>
